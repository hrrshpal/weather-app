<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Weather App</title>
</head>
<body>

    <nav class="navbar">
        <h1 class="app-name">Weather <span class="blue">App</span></h1>
        <input class="input-field" type="text" placeholder="Search for City">
        <button class="search-btn">Search</button>
    </nav>

    <main class="location-temperature">
        <p class="city"></p>
        <div>
            <span class="latitude"></span>
            <span class="longitude"></span>
        </div>
        <p class="time-and-date"></p>
        <p class="temperatureC"></p>
        <span class="temperatureF"></span>
        <p class="description"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
